<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Jordan Water District</title>

  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Jordan Water District">
  <meta name="application-name" content="Jordan Water District">
  <meta name="theme-color" content="#1226a3">
  <meta name="description" content="Jordan Water District — pay your water bill online, apply for services, check billing inquiries and public advisories.">
  <meta name="msapplication-TileImage" content="icon-192.png">
  <meta name="msapplication-TileColor" content="#0c1c80">
  <meta name="msapplication-tap-highlight" content="no">
  <meta property="og:title"       content="Jordan Water District">
  <meta property="og:description" content="Pay your water bill online, apply for services, and stay updated with public advisories.">
  <meta property="og:type"        content="website">
  <meta property="og:image"       content="icon-512.png">
  <meta name="twitter:card"       content="summary">
  <link rel="manifest" href="manifest.json">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0c1c80;width:100vw;height:100vh;overflow:hidden;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif;}

    /* ── SPLASH ── */
    #splash{position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;
      align-items:center;justify-content:center;padding:24px;transition:opacity .6s ease;
      background:
        radial-gradient(700px 480px at 82% -8%, rgba(10,164,232,.34), transparent 60%),
        radial-gradient(620px 460px at -10% 110%, rgba(18,38,163,.40), transparent 60%),
        linear-gradient(160deg,#0d2a8a,#0c1c80);}

    /* water drop card */
    .drop-card{width:min(82vw,300px);background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:26px 18px 22px;
      box-shadow:0 20px 60px rgba(0,0,0,.35);backdrop-filter:blur(6px);
      display:flex;flex-direction:column;align-items:center;
      animation:cardIn .6s cubic-bezier(.2,.9,.3,1.3) both;}
    @keyframes cardIn{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:none}}

    svg.drop{display:block;width:122px;height:auto;}
    .faucet{fill:rgba(255,255,255,.30);}
    .spout{fill:none;stroke:rgba(255,255,255,.30);stroke-width:3;}
    .droplet{fill:url(#wg);}
    .dropA{animation:fall 1.6s cubic-bezier(.55,0,.85,.4) infinite;}
    .dropB{animation:fall 1.6s cubic-bezier(.55,0,.85,.4) infinite;animation-delay:.55s;}
    .dropC{animation:fall 1.6s cubic-bezier(.55,0,.85,.4) infinite;animation-delay:1.1s;}
    @keyframes fall{
      0%{opacity:0;transform:translateY(0) scaleY(.7)}
      8%{opacity:1}
      55%{transform:translateY(74px) scaleY(1.15)}
      78%{opacity:1;transform:translateY(96px) scaleY(.5) scaleX(1.4)}
      82%{opacity:0;transform:translateY(96px) scaleY(.3) scaleX(1.7)}
      100%{opacity:0;transform:translateY(96px)}
    }
    .pool{fill:url(#wg);opacity:.5;}
    .ripple{fill:none;stroke:rgba(122,211,232,.85);stroke-width:2.5;transform-box:fill-box;transform-origin:center;}
    .rip1{animation:rip 1.6s ease-out infinite;animation-delay:.62s;}
    .rip2{animation:rip 1.6s ease-out infinite;animation-delay:1.17s;}
    @keyframes rip{0%,46%{opacity:0;transform:scale(.3)}54%{opacity:.8}100%{opacity:0;transform:scale(2.3)}}

    .cc-lbl{margin-top:14px;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#7dd3e8;}

    .app-name{margin-top:26px;font-weight:800;font-size:27px;letter-spacing:.2px;color:#eaf2ff;text-align:center;}
    .app-name .b{color:#34d0e8;}
    .app-sub{color:#9fb6d6;font-size:11px;font-weight:700;margin-top:8px;letter-spacing:3px;text-transform:uppercase;text-align:center;}

    #loadbarWrap{margin-top:30px;width:184px;height:7px;border-radius:7px;background:rgba(255,255,255,.12);overflow:hidden;}
    #loadbarWrap i{display:block;height:100%;width:42%;border-radius:7px;
      background:linear-gradient(90deg,#1226a3,#34d0e8);animation:slide 1.2s ease-in-out infinite;}
    @keyframes slide{0%{transform:translateX(-110%)}100%{transform:translateX(320%)}}

    #openBtn{display:none;margin-top:24px;background:#1226a3;color:#fff;border:none;border-radius:100px;
      padding:13px 26px;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 6px 0 #0c1c80;text-decoration:none;}
    #splash .hint{display:none;color:rgba(159,182,214,.7);font-size:11px;margin-top:12px;text-align:center;}

    #app-frame{position:fixed;inset:0;width:100%;height:100%;border:none;z-index:1;background:#0c1c80;}

    #installBanner{display:none;position:fixed;bottom:20px;left:12px;right:12px;z-index:998;
      background:#13235a;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.4);border:1.5px solid rgba(255,255,255,.12);padding:14px 16px;align-items:center;gap:12px;}
    #installBanner img{width:44px;height:44px;border-radius:12px;flex-shrink:0;}
    #installBanner .ib-text{flex:1;min-width:0;}
    #installBanner .ib-title{font-weight:800;font-size:14px;color:#eaf2ff;}
    #installBanner .ib-sub{font-size:12px;color:#9fb6d6;margin-top:2px;}
    #installBanner .ib-install{background:#0aa4e0;color:#fff;border:none;border-radius:10px;padding:9px 16px;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;flex-shrink:0;}
    #installBanner .ib-close{background:none;border:none;color:#9fb6d6;font-size:20px;cursor:pointer;padding:4px;flex-shrink:0;line-height:1;}
  </style>
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════════════
       Jordan Water District — deployed Apps Script Web App URL (hardcoded).
       If you redeploy and the /exec URL changes, update APP_URL below.
       ═══════════════════════════════════════════════════════════════ -->
  <script>
    var APP_URL = "https://script.google.com/macros/s/AKfycbwDo6x_XEMq2Ut8fSXA5_Dov_Hpt5Z7vacYWb2W0YQ3br0VPcHhFjC0WYu_ge-lv8LaNQ/exec";
  </script>

  <div id="splash">
    <div class="drop-card">
      <svg class="drop" viewBox="0 0 120 150" aria-hidden="true">
        <defs>
          <linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#34d0e8"/><stop offset="1" stop-color="#0aa4e0"/>
          </linearGradient>
        </defs>
        <!-- spout / faucet at top -->
        <path class="spout" d="M28 16 h40 a8 8 0 0 1 8 8 v6"/>
        <rect class="faucet" x="56" y="28" width="8" height="8" rx="2"/>
        <!-- droplets falling straight down the centre line -->
        <path class="droplet dropA" d="M60 34 c5 6 7 9 7 12 a7 7 0 0 1 -14 0 c0 -3 2 -6 7 -12 Z"/>
        <path class="droplet dropB" d="M60 34 c5 6 7 9 7 12 a7 7 0 0 1 -14 0 c0 -3 2 -6 7 -12 Z"/>
        <path class="droplet dropC" d="M60 34 c5 6 7 9 7 12 a7 7 0 0 1 -14 0 c0 -3 2 -6 7 -12 Z"/>
        <!-- pool + ripples where drops land -->
        <ellipse class="pool" cx="60" cy="132" rx="30" ry="6"/>
        <ellipse class="ripple rip1" cx="60" cy="132" rx="12" ry="3.5"/>
        <ellipse class="ripple rip2" cx="60" cy="132" rx="12" ry="3.5"/>
      </svg>
      <div class="cc-lbl">Clean &middot; Dependable &middot; Sustainable</div>
    </div>

    <div class="app-name">Jordan <span class="b">Water</span> District</div>
    <div class="app-sub">Online Services Portal</div>

    <div id="loadbarWrap"><i></i></div>

    <a id="openBtn" href="#" target="_blank" rel="noopener">Open the App  &rarr;</a>
    <div class="hint" id="openHint">Taking a while? Tap the button above.</div>
  </div>

  <iframe id="app-frame" allow="fullscreen; clipboard-write; camera; microphone" allowfullscreen></iframe>

  <div id="installBanner">
    <img src="icon-192.png" alt="Jordan Water District">
    <div class="ib-text">
      <div class="ib-title">Add to Home Screen</div>
      <div class="ib-sub">Install Jordan Water District for quick access</div>
    </div>
    <button class="ib-install" onclick="triggerInstall()">Install</button>
    <button class="ib-close"   onclick="dismissInstall()">✕</button>
  </div>

  <script>
    var splash=document.getElementById('splash'), frame=document.getElementById('app-frame'),
        openBtn=document.getElementById('openBtn'), openHint=document.getElementById('openHint');
    function hideSplash(){ splash.style.opacity='0'; setTimeout(function(){ splash.style.display='none'; },600); }

    frame.src = APP_URL; openBtn.href = APP_URL;
    frame.onload = function(){ setTimeout(hideSplash, 800); };
    setTimeout(hideSplash, 6000);
    setTimeout(function(){ openBtn.style.display='inline-block'; openHint.style.display='block'; }, 4500);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function(){ navigator.serviceWorker.register('sw.js').catch(function(e){console.warn('SW failed',e);}); });
    }
    var deferredPrompt;
    window.addEventListener('beforeinstallprompt', function(e){ e.preventDefault(); deferredPrompt=e; document.getElementById('installBanner').style.display='flex'; });
    window.addEventListener('appinstalled', function(){ document.getElementById('installBanner').style.display='none'; deferredPrompt=null; });
    function triggerInstall(){ if(!deferredPrompt) return; deferredPrompt.prompt(); deferredPrompt.userChoice.then(function(){ deferredPrompt=null; }); }
    function dismissInstall(){ document.getElementById('installBanner').style.display='none'; }
  </script>
</body>
</html>
